<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Application</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            background-color: #e63946;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover {
            background-color: #c1121f;
        }
        p {
            color: #457b9d;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Reset Session</h2>
        <p>Clicking the button below will clear all group data, allow submission and refresh the page.</p>
        <button onclick="resetApp()">Clear Data & Reload</button>
    </div>

    <script>
        function resetApp() {
            // Clears the LocalStorage
            localStorage.clear();
            // Reloads the current page
            location.reload();
        }
    </script>

</body>
</html>
