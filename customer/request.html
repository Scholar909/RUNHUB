<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Requests | NOVA HUB</title>

<link rel="manifest" href="/start/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/start/icon-512.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/foundicons/3.0.0/foundation-icons.min.css">
<link rel="stylesheet" href="css/request.css?=v8">
</head>

<body>

<div class="main-wrapper">

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="menu-trigger" onclick="toggleDrawer()">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="logo">NOVA<span class="accent">HUB</span></div>

        <div class="status-indicator">
            <span class="dot animate-flicker"></span> LIVE
        </div>
    </nav>

    <!-- DRAWER -->
    <div id="navDrawer" class="nav-drawer">
        <div class="drawer-header">
            <h3>Menu</h3>
            <span class="close-drawer" onclick="toggleDrawer()">&times;</span>
        </div>

        <ul class="drawer-links">
            <li><a href="home.html">Dashboard</a></li>
            <li><a href="history.html">My Orders</a></li>
            <li><a href="track-order.html">Track Order</a></li>
            <li><a href="rating.html">Rate Merchants</a></li>
            <li><a href="profile.html">My Account</a></li>
            <li><a href="request.html">Post Request</a></li>
            <li><a href="cust-ser.html">Support</a></li>
        </ul>

        <div class="drawer-footer">
            <button class="logout-btn">
                <i class="fi-power"></i> Logout
            </button>
        </div>
    </div>
    
          <div class="search-container" style="padding: 10px 6%; background: var(--bg-dark);">
          <input type="text" id="boardSearch" placeholder="Search locations, items, or users..." 
                 style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--glass); color: white;">
      </div>


    <section class="live-board">Loading...
        </section>
    
    <div class="split-divider"></div>
    
    <section class="bottom-panel">
        <div class="tabs">
            <button class="tab active">Alerts</button>
            <button class="tab">Reactions</button>
            <button class="tab">My Requests</button>
        </div>
        
        <div id="addContainer" style="display:none; margin-bottom:10px;">
            <button class="btn primary w-100" onclick="openForm()">+ Create Request</button>
        </div>
    
        <div class="tab-content">Loading...</div>
    </section>
    
    <div id="formModal" class="form-modal">
        <div class="form-box">
            <h3>Create Request</h3>
    
            <input type="text" id="fromInput" placeholder="From (e.g. Wuse, Wuse 2)">
            <input type="text" id="toInput" placeholder="To (e.g. Gwarinpa)">
            <input type="text" id="itemInput" placeholder="Item (e.g. Food, Drinks)">
            
            <label style="font-size: 0.7rem; color: var(--text-dim);">Duration (Minutes)</label>
            <input type="number" id="durationInput" placeholder="e.g. 20">
    
            <div class="actions">
                <button class="btn ghost" onclick="closeForm()">Cancel</button>
                <button class="btn primary" id="submitBtn">Create</button>
            </div>
        </div>
    </div>
    


    <!-- FOOTER (UNCHANGED) -->
    <footer class="bottom-nav">
        <a href="history.html" class="nav-icon-box"><i class="fi-clock"></i></a>
        <a href="rating.html" class="nav-icon-box"><i class="fi-star"></i></a>
        <a href="home.html" class="nav-icon-box active"><i class="fi-home"></i></a>
        <a href="profile.html" class="nav-icon-box"><i class="fi-torso"></i></a>
        <a href="cust-ser.html" class="nav-icon-box"><i class="fi-comments"></i></a>
    </footer>

</div>

<script src="/start/pwa-handler.js"></script>
    <script src="js/request.js?=v19" type="module"></script>
    <script src="js/firebase-config.js?=v10" type="module"></script>

</body>
</html>
