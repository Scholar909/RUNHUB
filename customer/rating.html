<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Merchant | RUN Delivery Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/foundicons/3.0.0/foundation-icons.min.css">
    <link rel="stylesheet" href="css/rating.css?=v6">
</head>
<body>
    <div class="main-wrapper">
        <nav class="navbar">
            <div class="menu-trigger" onclick="toggleDrawer()">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <div class="logo">RUN<span class="accent">HUB</span></div>
            <div class="status-indicator">
                <span class="dot animate-flicker"></span> FEEDBACK
            </div>
        </nav>

<div id="navDrawer" class="nav-drawer">
    <div class="drawer-header">
        <h3>Menu</h3>
        <span class="close-drawer" onclick="toggleDrawer()">&times;</span>
    </div>
    <ul class="drawer-links">
        <li><a href="home.html">Dashboard</a></li>
        <li><a href="history.html">My Orders</a></li>
        <li><a href="rating.html">Rate Merchants</a></li>
        <li><a href="profile.html">My Account</a></li>
        <li><a href="service.html">Support</a></li>
    </ul>
    <div class="drawer-footer">
        <button class="logout-btn" onclick="handleLogout()">
            <i class="fi-power"></i> Logout
        </button>
    </div>
</div>


        <main class="content-body">
            <header class="section-header">
                <h1>Rate a <span class="highlight">Merchant</span></h1>
                <p class="hero-description">Share your experience to help maintain high service standards.</p>
            </header>

            <div class="search-container">
                <div class="search-box">
                    <i class="fi-magnifying-glass"></i>
                    <input type="text" id="merchantSearch" placeholder="Search merchant username..." autocomplete="off">
                </div>
                <div id="suggestions" class="suggestion-box">
                    </div>
            </div>
            
            <div id="reviewsFeed" class="reviews-feed">
                </div>

            <div id="ratingPortal" class="rating-portal" style="display: none;">
                <div class="trust-card review-card">
                    <div class="card-tag">NEW REVIEW</div>
                    <div class="merchant-identity">
                        <h3 id="selectedMerchant">@SwiftCourier</h3>
                        <p>What was your experience?</p>
                    </div>

                    <div class="star-rating">
                        <input type="radio" name="stars" id="star5" value="5"><label for="star5">★</label>
                        <input type="radio" name="stars" id="star4" value="4"><label for="star4">★</label>
                        <input type="radio" name="stars" id="star3" value="3"><label for="star3">★</label>
                        <input type="radio" name="stars" id="star2" value="2"><label for="star2">★</label>
                        <input type="radio" name="stars" id="star1" value="1"><label for="star1">★</label>
                    </div>

                    <textarea id="reviewText" placeholder="Write a short review (optional)..." maxlength="150"></textarea>
                    
                    <button class="btn btn-filled w-100">Submit Review</button>
                </div>
            </div>
        </main>

        <footer class="bottom-nav">
            <a href="history.html" class="nav-icon-box"><i class="fi-clock"></i></a>
            <a href="rating.html" class="nav-icon-box active"><i class="fi-star"></i></a>
            <a href="home.html" class="nav-icon-box"><i class="fi-home"></i></a>
            <a href="profile.html" class="nav-icon-box"><i class="fi-torso"></i></a>
            <a href="cust-ser.html" class="nav-icon-box"><i class="fi-comments"></i></a>
        </footer>
    </div>

    <script src="/js/rating.js?=v7" type="module"></script>
    <script src="js/firebase-config.js?=v5" type="module"></script>
</body>
</html>
