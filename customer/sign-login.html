<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Access | RUN HUB</title>
    <link rel="stylesheet" href="css/sign-login.css?=v10">
</head>
<body>
    <div class="main-wrapper">
        <nav class="navbar">
            <a href="../index.html" class="logo">RUN<span class="accent">HUB</span></a>
            <div class="status-indicator">
                <span class="dot animate-flicker"></span> CUSTOMER GATEWAY
            </div>
        </nav>

        <main class="auth-container">
            <header class="section-header">
                <h1>Student <span class="highlight">Access</span></h1>
                <p class="hero-description">Sign in or create your student runner account.</p>
            </header>

            <div class="tab-switcher">
                <button onclick="switchTab('login')" id="l-btn" class="tab-btn active">Login</button>
                <button onclick="switchTab('signup')" id="s-btn" class="tab-btn">Sign Up</button>
            </div>

            <div id="login-view" class="tab-view active">
                <form id="customer-login" class="report-card">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" class="glass-input" placeholder="e.g. runner_01" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="glass-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-filled w-100">Sign In to Hub</button>
                </form>
            </div>

            <div id="signup-view" class="tab-view">
                <form id="customer-signup" class="report-card scroll-box">
                    <div class="card-tag">NEW ACCOUNT DETAILS</div>
                    
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" placeholder="johndoe22" required>
                            <small id="username-status" class="validation-msg"></small>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" placeholder="email" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Level</label>
                            <input type="number" placeholder="400" required>
                        </div>
                        <div class="form-group">
                            <label>Matric No</label>
                            <input type="text" placeholder="RUN/ABC/12/12345" required>
                            <small id="matric-status" class="validation-msg"></small>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>WhatsApp Number</label>
                        <input type="tel" placeholder="08012345678" required>
                    </div>

                    <div class="form-group">
                        <label>Gender</label>
                        <select class="glass-input" id="gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Hostel</label>
                        <select class="glass-input" id="hostel" required>
                            <option value="">Select Hostel</option>
                            <option>Prophet Moses Hostel (Main Boys)</option>
                            <option>Queen Esther Hostel (Main Girls)</option>
                            <option>Boys Extension Hostel</option>
                            <option>Girls Extension Hostel</option>
                            <option>Engr. Male Hostel</option>
                            <option>Engr. Female Hostel</option>
                            <option>Guest House</option>
                        </select>
                    </div>
                    
                    <div class="form-row">
                    
                    <div class="form-group">
                    <label>Block</label>
                    <select class="glass-input" id="block" required></select>
                    </div>
                    
                    <div class="form-group">
                    <label>Room</label>
                    <select class="glass-input" id="room" required></select>
                    </div>
                    
                    </div>

                    <div class="card-tag" style="margin-top:20px">PAYMENT SETTINGS (FOR REFUNDS)</div>

                    <div class="form-group">
                        <label>Bank Name</label>
                        <input type="text" placeholder="Access Bank" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Account Name</label>
                            <input type="text" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label>Account No</label>
                            <input type="text" placeholder="1234567890" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="Create Password" required>
                        <input type="password" placeholder="Confirm Password" required style="margin-top:10px">
                    </div>

                    <div class="legal-check">
                        <label><input type="checkbox" required> I agree to the <a href="../pol.html" class="accent-link">Privacy Policy</a></label>
                        <label><input type="checkbox" required> I accept the <a href="../tandc.html" class="accent-link">Terms & Conditions</a></label>
                    </div>

                    <button type="submit" class="btn btn-filled w-100">Create Account</button>
                </form>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; <span id="year"></span> RUN HUB. Verified Students Only.</p>
        </footer>
    </div>
    <script src="js/sign-login.js?=v22" type="module" defer></script>
</body>
</html>
