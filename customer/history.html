<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History | NOVA Delivery Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/foundicons/3.0.0/foundation-icons.min.css">
    <link rel="stylesheet" href="css/history.css?=v7">
</head>
<body>
    <div class="main-wrapper">
        <nav class="navbar">
            <div class="menu-trigger" onclick="toggleDrawer()">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <div class="logo">NOVA<span class="accent">HUB</span></div>
            <div class="status-indicator">
                <span class="dot animate-flicker"></span> HISTORY
            </div>
        </nav>

<div id="navDrawer" class="nav-drawer">
    <div class="drawer-header">
        <h3>Menu</h3>
        <span class="close-drawer" onclick="toggleDrawer()">&times;</span>
    </div>
    <ul class="drawer-links">
        <li><a href="home.html">Dashboard</a></li>
        <li><a href="history.html">My Orders</a></li>
        <li><a href="rating.html">Rate Merchants</a></li>
        <li><a href="profile.html">My Account</a></li>
        <li><a href="service.html">Support</a></li>
    </ul>
    <div class="drawer-footer">
        <button class="logout-btn" onclick="handleLogout()">
            <i class="fi-power"></i> Logout
        </button>
    </div>
</div>


        <main class="content-body">
            <header class="section-header">
                <h1>Your <span class="highlight">Orders</span></h1>
                <p class="hero-description">Track your active deliveries and past transactions here.</p>
            </header>

            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('pending')">Pending</button>
                <button class="tab-btn" onclick="switchTab('delivered')">Delivered</button>
                <button class="tab-btn" onclick="switchTab('declined')">Declined</button>
            </div>

            <div id="historyGrid" class="trust-grid">
                <div class="trust-card history-card">
                    <div class="order-info-stack">
                        <div class="card-tag status-pending">PENDING APPROVAL</div>
                        <div class="order-header">
                            <h3>@SwiftCourier</h3>
                        </div>
                        <div class="order-summary">
                            <p>Total: <span class="accent">₦1,550</span></p>
                        </div>
                        <span class="order-date">Oct 12, 10:30 AM</span>
                    </div>
                    <button class="btn btn-outline">View</button>
                </div>
            </div>
        </main>

        <footer class="bottom-nav">
            <a href="history.html" class="nav-icon-box active"><i class="fi-clock"></i></a>
            <a href="rating.html" class="nav-icon-box"><i class="fi-star"></i></a>
            <a href="home.html" class="nav-icon-box"><i class="fi-home"></i></a>
            <a href="profile.html" class="nav-icon-box"><i class="fi-torso"></i></a>
            <a href="cust-ser.html" class="nav-icon-box"><i class="fi-comments"></i></a>
        </footer>
    </div>

    <script src="js/cust-history.js?=v9" type="module"></script>
    <script src="js/firebase-config.js?=v5" type="module"></script>
</body>
</html>
