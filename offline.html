<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - RUN Delivery Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Override some variables for offline page */
    body {
      background-color: #ffffff;
      color: #1c1c1e;
    }
    .offline-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 10%;
      text-align: center;
    }
    .offline-card {
      background: rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.08);
      padding: 40px;
      border-radius: 24px;
      max-width: 500px;
      width: 100%;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      transition: transform 0.3s ease;
    }
    .offline-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    .offline-card h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }
    .offline-card p {
      font-size: 1rem;
      color: #6e6e73;
      margin-bottom: 30px;
      line-height: 1.5;
    }
    .btn-filled {
      background: #007aff;
      color: #ffffff;
      padding: 15px 30px;
      border-radius: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-filled:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0, 122, 255, 0.2);
    }
    @media (max-width: 768px) {
      .offline-card h1 { font-size: 2rem; }
      .offline-card { padding: 30px; }
    }
  </style>
</head>
<body>
  <div class="offline-wrapper">
    <div class="offline-card">
      <h1>Oops! You’re Offline 😔</h1>
      <p>RUN Delivery Hub can’t connect to the internet right now. Check your connection and try again.</p>
      <a href="/" class="btn-filled">Retry</a>
    </div>
  </div>
</body>
</html>
