<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscription Plans</title>
    <link rel="stylesheet" href="css/plans.css?=v3" />
</head>
<body>

<div class="main-wrapper">

    <div class="navbar">
        <div></div>
        <div class="status-indicator">
            <span class="dot animate-flicker"></span>
            Subscription Required
        </div>
    </div>

    <div class="content-body">
        <h1>Choose a <span class="highlight">Plan</span></h1>
        <p class="hero-description">
            Your wallet payment is required.
        </p>

        <!-- Wallet Alert -->
        <div class="trust-card" id="walletCard" style="display:none;">
            <div class="card-tag">WALLET DEBT/CREDIT</div>
            <h3 id="walletAmount">₦0</h3>
            <p class="hero-description">Outstanding admin fee payment required.</p>
        </div>

    </div>
</div>

<script type="module" src="js/plans.js?=v10"></script>
<script src="https://js.paystack.co/v2/inline.js"></script>
</body>
</html>
