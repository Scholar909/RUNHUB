<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intents | NOVA HUB</title>

<link rel="manifest" href="/start/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/start/icon-512.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/foundicons/3.0.0/foundation-icons.min.css">
<link rel="stylesheet" href="css/intent.css?=v4">
</head>

<body>

<div class="main-wrapper">

    <!-- NAVBAR (UNCHANGED) -->
    <nav class="navbar">
        <div class="menu-trigger" onclick="toggleDrawer()">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="logo">NOVA<span class="accent">HUB</span></div>

        <div class="status-indicator">
            <span class="dot animate-flicker"></span> LIVE
        </div>
    </nav>

    <!-- DRAWER (UNCHANGED) -->

<div id="navDrawer" class="nav-drawer">
    <div class="drawer-header">
        <h3>Merchant Menu</h3>
        <span class="close-drawer" onclick="toggleDrawer()">&times;</span>
    </div>
    <ul class="drawer-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="orders.html">Active Orders</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="session.html">Set Session</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="intent.html">Post Intent</a></li>
        <li><a href="merch-ser.html">Customer Service</a></li>
    </ul>
    <div class="drawer-footer">
        <button class="logout-btn" onclick="handleLogout()">
            <i class="fi-power"></i> Logout
        </button>
    </div>
</div>

      <div class="search-container" style="padding: 10px 6%; background: var(--bg-dark);">
          <input type="text" id="boardSearch" placeholder="Search locations, items, or users..." 
                 style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--glass); color: white;">
      </div>


    <!-- 🔝 LIVE BOARD -->
    <section class="live-board">Loading...</section>

    <!-- DIVIDER -->
    <div class="split-divider"></div>

    <!-- 🔽 BOTTOM PANEL -->
    <section class="bottom-panel">

        <div class="tabs">
            <button class="tab active">Alerts</button>
            <button class="tab">Reactions</button>
            <button class="tab">My Intents</button>
        </div>

        <!-- ADD BUTTON -->
        <div id="addContainer" style="display:none; margin-bottom:10px;">
            <button class="btn primary w-100" onclick="openForm()">+ Create Intent</button>
        </div>

        <div class="tab-content">Loading...</div>

    </section>

    <!-- CREATE INTENT FORM -->
    <div id="formModal" class="form-modal">
        <div class="form-box">

            <h3>Create Intent</h3>

            <input type="text" placeholder="From (e.g. Wuse, Wuse 2)">
            <input type="text" placeholder="To (e.g. Gwarinpa)">

            <input type="number" id="durationInput" placeholder="Enter minutes (e.g. 20)">

            <div class="actions">
                <button class="btn ghost" onclick="closeForm()">Cancel</button>
                <button class="btn primary" id="submitBtn" onclick="saveIntent()">Create</button>
            </div>

        </div>
    </div>

    <!-- FOOTER (UNCHANGED) -->
        <footer class="bottom-nav">
            <a href="orders.html" class="nav-icon-box"><i class="fi-page-edit"></i></a>
            <a href="history.html" class="nav-icon-box"><i class="fi-clock"></i></a>
            <a href="dashboard.html" class="nav-icon-box active"><i class="fi-home"></i></a>
            <a href="profile.html" class="nav-icon-box"><i class="fi-torso"></i></a>
            <a href="merch-ser.html" class="nav-icon-box"><i class="fi-comments"></i></a>
        </footer>

</div>

</body>
</html>
