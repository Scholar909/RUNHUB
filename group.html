<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET 306 Project Picker</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--dark);
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h2 { margin-bottom: 0.5rem; color: var(--primary); }
        p.subtitle { margin-bottom: 2rem; font-size: 0.9rem; opacity: 0.8; }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background: white;
        }

        .warning-box {
            background: #fffbeb;
            border-left: 4px solid var(--accent);
            padding: 1rem;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            text-align: left;
        }

        #pickButton {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, background 0.2s;
        }

        #pickButton:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        #animationArea { display: none; margin-top: 2rem; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #resultArea {
            display: none;
            margin-top: 2rem;
            padding: 2rem;
            border: 3px dashed var(--primary);
            border-radius: 15px;
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .project-title { font-size: 1.5rem; font-weight: 800; color: #1d4ed8; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>GET 306 Project Allocation</h2>
    <p class="subtitle">Computer Engineering (April 2026)</p>

    <div id="selectionForm">
        <div class="form-group">
            <label>Select Your Group Letter</label>
            <select id="groupLetter">
                <option value="">-- Choose Group --</option>
                <option value="A">Group A</option>
                <option value="B">Group B</option>
                <option value="C">Group C</option>
                <option value="D">Group D</option>
                <option value="E">Group E</option>
                <option value="F">Group F</option>
                <option value="G">Group G</option>
            </select>
        </div>

        <div class="form-group">
            <label>Select Your Name (Representative)</label>
            <select id="studentSelect">
                <option value="">-- Select Group First --</option>
            </select>
        </div>

        <div class="warning-box">
            ⚠️ <strong>WARNING:</strong> You are picking for your whole group. This action is irreversible and will be recorded.
        </div>

        <button id="pickButton">PROCEED TO PICK PROJECT</button>
    </div>

    <div id="animationArea">
        <div class="spinner"></div>
        <p id="suspenseText">Calculating probabilities...</p>
    </div>

    <div id="resultArea">
        <p>Your Group has been assigned:</p>
        <div id="projectResult" class="project-title"></div>
        <p style="font-size: 0.8rem; margin-top: 20px;">Selection recorded successfully.</p>
    </div>
</div>

<script type="module">
    // Import the functions you need from the SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, getDocs, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC7onB0OptTyu-J6J1PwU6zX799tQIjh4k",
        authDomain: "affiliate-app-dab95.firebaseapp.com",
        projectId: "affiliate-app-dab95",
        storageBucket: "affiliate-app-dab95.appspot.com",
        messagingSenderId: "510180440268",
        appId: "1:510180440268:web:99be47162857f635d8ea69"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const students = {
        "A": ["OGBOLE ENEH FAVOUR (RUN/CPE/23/14551)", "IPINLAIYE OLUWASEGUN (RUN/CPE/23/14539)", "ABIOLA MOYOSORE DAVID (RUN/CHE/23/14482)", "ADEWOYIN ENOCH (RUN/CPE/23/14518)", "LAWAL AYOMIDE (RUN/CPE/23/14545)", "ODEY ZEAL DONNY (RUN/CPE/23/14550)", "JEGEDE OLUWADARASIMI (RUN/CPE/23/14542)", "IBUDE SAMUEL (RUN/CPE/23/14537)"],
        "B": ["OGUNBODEDE SAMUEL (RUN/CPE/23/14552)", "ADEBAJO EMMANUEL (RUN/CPE/23/14515)", "MUIBI MUIZ (RUN/CPE/23/14547)", "SIMON-ALADE PEACE (RUN/CPE/23/14568)", "ISIBOR EMMANUEL (RUN/CPE/23/14540)", "ONORIODE BLESSED (RUN/CPE/23/14562)", "OGUNSAKIN SOLOMON (RUN/CPE/23/14555)", "EKUNDAYO EVERBRIGHT (RUN/CPE/23/14531)", "OLATOYE FISAYOMI (RUN/CPE/22/12071)"],
        "C": ["OGUNGBE FAVOUR (RUN/CPE/23/14553)", "IDOWU KEHINDE (RUN/CPE/23/14538)", "BOLARINWA FEYINSOLA (RUN/CPE/23/14528)", "ADEBANWO AYOMIDE SAMUEL (RUN/CHE/23/14483)", "GWATANA SAMUEL (RUN/CPE/23/14535)", "OGUNLANA FULFILMENT (RUN/CPE/23/14554)", "OKUNOLA PRAISE (RUN/CPE/23/14559)", "AWOGBEMI AYOMIDE (RUN/CPE/23/14524)", "AKINBOHUN ISRAEL AKINTOMIWA (RUN/CPE/22/12021)"],
        "D": ["TIM-MORDI ISRAEL (RUN/CPE/23/14570)", "GODSWILL KINGSLEY EDOHO (RUN/CPE/22/12046)", "JESUGBAMILA TIJESULOGO (RUN/CPE/23/14543)", "AYODELE AYO ADAMS (RUN/CPE/23/14525)", "MATANMI TIJESUNMI (RUN/CPE/23/14546)", "OYINLOYE DANIEL (RUN/CPE/23/14566)", "OYERINDE IREOLUWADE (RUN/CPE/23/14565)", "OLUWADARE VICTOR (RUN/CPE/23/14561)", "HARMONY HARMONY (RUN/CPE/23/14536)"],
        "E": ["ADEFARATI MOLOLUWA (RUN/CPE/23/14516)", "JAMES EMMANUEL (RUN/CPE/23/14541)", "FOHUNOLA DAVID (RUN/CPE/23/14533)", "EJEMBI REX (RUN/CPE/23/14530)", "LASEKAN ENOCH (RUN/CPE/23/14544)", "TAYLOR MICHAEL (RUN/CPE/23/14569)", "OJO MOYOSOREOLUWA (RUN/CPE/23/14557)", "AKOBE OLADIPUPO (RUN/CPE/23/14523)"],
        "F": ["BASSEY INI-ABASI EKAN (RUN/CPE/23/14527)", "AKINWUMI DOMINIC (RUN/CPE/23/14522)", "OYEKUNLE TESTIMONY (RUN/CPE/23/14564)", "CHUKWUEMEKA NMESOMA (RUN/CPE/23/14529)", "OBISESAN KOLADE (RUN/CPE/23/14548)", "SAMUEL UCHECHUKWU (RUN/CPE/23/14567)", "AFOLABI SHARON (RUN/CPE/23/14520)", "ADEBAYO KHALID (RUN/CPE/24/16549)", "AFOLABI FERANMI (RUN/CPE/23/14519)"],
        "G": ["ADEFUYE OLUWADARA (RUN/CPE/23/14517)", "OKUNOLA GABRIELLA (RUN/CPE/23/14558)", "EZEH DIVINE EBUBECHUKWU (RUN/CPE/24/16574)", "ENIAYEKAN JOSHUA (RUN/CPE/23/14532)", "ODEBODE IYANUOLUWA (RUN/CPE/23/14549)", "OGUNTUNDE TIMILEHIN (RUN/CPE/23/14556)", "OKWARA DELIGHT (RUN/CPE/23/14560)", "GANIYU FAVOUR (RUN/CPE/23/14534)", "BANKOLE OLUWATOMIYIN (RUN/CPE/23/14526)"]
    };

    const projects = [
        "GROUP 1 - Clinometer",
        "GROUP 2 - Small wind turbine vertical axis",
        "GROUP 3 - Small wind turbine horizontal axis",
        "GROUP 4 - Mini-solar power for charging and lighting",
        "GROUP 5 - Energy Audit for Engineering",
        "GROUP 6 - Design a solar battery hybrid system",
        "GROUP 7 - Use of wind resources in Nigeria"
    ];

    // Functions to handle logic
    const updateStudentList = () => {
        const group = document.getElementById('groupLetter').value;
        const studentSelect = document.getElementById('studentSelect');
        studentSelect.innerHTML = '<option value="">-- Select Your Name --</option>';
        
        if(group && students[group]) {
            students[group].forEach(s => {
                let opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                studentSelect.appendChild(opt);
            });
        }
    };

    const startRolling = async () => {
        const group = document.getElementById('groupLetter').value;
        const student = document.getElementById('studentSelect').value;
        const btn = document.getElementById('pickButton');

        if(!group || !student) {
            alert("Please select both your Group and your Name.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Checking...";

        try {
            // 1. Check if this group already picked
            const docRef = doc(db, "selections", group);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                alert("This group has already picked a project!");
                location.reload();
                return;
            }

            // 2. Check which projects are already taken
            const querySnapshot = await getDocs(collection(db, "selections"));
            let takenProjects = [];
            querySnapshot.forEach((doc) => {
                takenProjects.push(doc.data().project);
            });

            let availableProjects = projects.filter(p => !takenProjects.includes(p));

            if (availableProjects.length === 0) {
                alert("All projects have been assigned!");
                return;
            }

            // 3. Random pick
            const finalProject = availableProjects[Math.floor(Math.random() * availableProjects.length)];

            // 4. UI Transition
            document.getElementById('selectionForm').style.display = 'none';
            document.getElementById('animationArea').style.display = 'block';

            const messages = ["Verifying Representative...", "Running Randomizer...", "Securing Assignment...", "Generating Result..."];
            let mIdx = 0;
            const msgInterval = setInterval(() => {
                if(messages[mIdx]) {
                    document.getElementById('suspenseText').innerText = messages[mIdx];
                    mIdx++;
                }
            }, 1200);

            // 5. Save and Show
            setTimeout(async () => {
                clearInterval(msgInterval);
                await setDoc(doc(db, "selections", group), {
                    representative: student,
                    groupLetter: group,
                    project: finalProject,
                    timestamp: serverTimestamp()
                });

                document.getElementById('animationArea').style.display = 'none';
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('projectResult').innerText = finalProject;
            }, 5000);

        } catch (e) {
            console.error("Error: ", e);
            alert("Connection error. Please try again.");
            btn.disabled = false;
            btn.innerText = "PROCEED TO PICK PROJECT";
        }
    };

    // Attach events (since using type="module", we can't use onclick in HTML easily)
    document.getElementById('groupLetter').addEventListener('change', updateStudentList);
    document.getElementById('pickButton').addEventListener('click', startRolling);
</script>

</body>
</html>
