<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy | RUNHUB</title>
    <style>
        :root { --bg: #0a0b10; --text: #f5f5f7; --accent: #007aff; --glass: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; line-height: 1.6; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: var(--accent); font-size: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .content-area { background: var(--glass); padding: 30px; border-radius: 20px; white-space: pre-wrap; margin-top: 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Back</a>
        <h1>Privacy Policy</h1>
        <div id="legalContent" class="content-area">Loading the latest policy...</div>
    </div>

    <script type="module">
        import { db } from "./js/firebase-config.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        async function loadPolicy() {
            const docRef = doc(db, "platform_legal", "privacy");
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                document.getElementById('legalContent').innerText = snap.data().content;
            } else {
                document.getElementById('legalContent').innerText = "Privacy Policy is currently being updated.";
            }
        }
        loadPolicy();
    </script>
</body>
</html>
