<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy | NOVAHUB</title>
    <style>
    body {
        margin: 0;
        padding: 20px;
        background: #0a0b10;
        color: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Inter, sans-serif;
        line-height: 1.7;
      }
    
      a {
        color: #007aff;
        text-decoration: none;
      }
    
      a:hover {
        text-decoration: underline;
      }
    
      .container {
        max-width: 900px;
        margin: auto;
      }
    
      .back-link {
        display: inline-block;
        margin-bottom: 20px;
        font-weight: 600;
      }
    
      h1 {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 20px;
      }
    
      /* Let Quill content control its own spacing */
      #legalContent {
        color: #f5f5f7;
      }
    
      #legalContent h2,
      #legalContent h3,
      #legalContent h4,
      #legalContent h5 {
        margin-top: 1.5em;
        margin-bottom: 0.5em;
        font-weight: 700;
      }
    
      #legalContent p {
        margin-bottom: 1em;
      }
    
      #legalContent ul,
      #legalContent ol {
        margin-bottom: 1em;
        padding-left: 1.5em;
      }
    
      #legalContent li {
        margin-bottom: 0.5em;
      }
    
      #legalContent blockquote {
        margin: 1em 0;
        padding-left: 1em;
        border-left: 3px solid #007aff;
        color: #9ca3af;
      }
    
      /* Mobile */
      @media(max-width: 700px) {
        body {
          padding: 15px;
        }
    
        h1 {
          font-size: 1.6rem;
        }
      }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-link">← Back</a>
        <h1>Privacy Policy</h1>
        <div id="legalContent" class="content-area">Loading the latest policy...</div>
    </div>

    <script type="module">
        import { db } from "./start/script.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        async function loadPolicy() {
            const docRef = doc(db, "platform_legal", "privacy");
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                document.getElementById('legalContent').innerHTML = snap.data().content;
            } else {
                document.getElementById('legalContent').innerText = "Privacy Policy is currently being updated.";
            }
        }
        loadPolicy();
    </script>
</body>
</html>
