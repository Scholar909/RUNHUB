<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merchant Verification | NOVAHUB Admin</title>

<link rel="manifest" href="/start/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/start/icon-512.png">


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/foundicons/3.0.0/foundation-icons.min.css">
<link rel="stylesheet" href="css/view-verify.css?v=8">

</head>

<body>

<div class="main-wrapper">

<nav class="navbar">


<div class="logo">NOVA<span class="accent">HUB</span></div>

<div class="status-indicator">
<span class="dot animate-flicker"></span>
VERIFY APPLICATION
</div>

</nav>



<main class="content-body">

<header class="profile-header">

<div class="profile-avatar-wrapper">

<img id="profilePhoto" class="profile-img">

<div class="badge">MERCHANT</div>

</div>

<h1 id="displayName">Loading...</h1>
<p id="handle">@merchant</p>

</header>



<section class="details-grid">

<div class="trust-card">

<div class="card-tag">PERSONAL DETAILS</div>

<div id="personalDetails"></div>

</div>



<div class="trust-card">

<div class="card-tag">HOSTEL INFORMATION</div>

<div id="hostelDetails"></div>

</div>



<div class="trust-card">

<div class="card-tag">BANK DETAILS</div>

<div id="bankDetails"></div>

</div>

<div id="catchPhraseContainer" class="trust-card">
  <span class="label">Catch Phrase</span>
  <span id="catchPhrase"></span>
</div>



<div class="trust-card">

<div class="card-tag">VERIFICATION FILES</div>

<div class="file-grid">

  <div class="file-item">
    <span class="file-label">ID Front</span>
    <img id="idFront" class="file-img">
  </div>

  <div class="file-item">
    <span class="file-label">ID Back</span>
    <img id="idBack" class="file-img">
  </div>
  
  <div class="file-item">
    <span class="file-label">Profile Selfie</span>
    <img id="profileBottom" class="file-img">
  </div>

  <div class="file-item">
    <span class="file-label">Face Scan</span>
    <img id="faceScan" class="file-img">
  </div>
  
</div>
</div>

<div class="trust-card">
    <div class="card-tag">ADMIN BINDING REVIEW & SIGNATURE</div>
    
    <div class="info-row">
        <span class="label">Merchant's Signed Copy</span>
        <a id="downloadAgreement" href="#" class="btn-download" style="color: #007aff; text-decoration: underline;">
            View Merchant Agreement
        </a>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #333;">

    <div class="admin-sign-container">
        <div class="sign-header">
            <span class="label">ADMIN SIGNATURE BOARD</span>
            <div class="board-controls">
                <button type="button" id="clearBoard" class="mini-btn">Clear</button>
            </div>
        </div>
        
        <div class="signature-wrapper">
            <canvas id="adminSignCanvas"></canvas>
            <div class="signature-line"></div>
        </div>

        <div class="admin-inputs-row">
            <div class="input-group">
                <label>ADMIN FULL NAME</label>
                <input type="text" id="adminFullName" placeholder="Enter your name">
            </div>
            <div class="input-group">
                <label>SIGNING DATE</label>
                <input type="text" id="adminSignDate" readonly>
            </div>
        </div>
    </div>

    <p id="uploadStatus"></p>

    <button id="saveSignedDocBtn" class="btn-primary">
        Stamp & Finalize Agreement
    </button>
</div>

</section>



<div class="action-footer-btns">

<button class="btn btn-outline" onclick="history.back()">
Back to Applications
</button>

</div>

</main>

</div>
<script src="/start/pwa-handler.js"></script>
<script type="module" src="js/view-verify.js?v=29"></script>

</body>
</html>
