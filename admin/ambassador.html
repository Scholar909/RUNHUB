<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambassador Management | NOVAHUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/foundicons/3.0.0/foundation-icons.min.css">
    <style> 
        :root {
            --bg-dark: #0a0b10;
            --accent: #007aff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f5f5f7;
            --text-dim: #86868b;
            --error: #ff3b30;
            --success: #34c759;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            line-height: 1.6;
            padding-bottom: 100px;
        }

        .main-wrapper { padding: 0 8%; min-height: 100vh; }
        .navbar { height: 100px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: 1px; }
        .accent { color: var(--accent); }

        .content-body { padding: 40px 0; }
        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
        .highlight { background: linear-gradient(180deg, #fff 0%, var(--text-dim) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Ambassador Cards */
        .ambassador-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; 
            margin-top: 30px; 
        }
        .ambassador-card { 
            background: var(--glass); border: 1px solid var(--border); 
            padding: 20px; border-radius: 24px; backdrop-filter: blur(20px);
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 2px solid var(--accent); }
        .amb-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; }
        .amb-info { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 15px; }
        
        .btn-view {
            background: var(--accent); color: white; border: none; padding: 10px 20px;
            border-radius: 12px; cursor: pointer; font-size: 0.8rem; font-weight: 600;
            text-decoration: none; transition: 0.3s;
        }

        /* Modal / Form Styling */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #1c1c1e; width: 90%; max-width: 450px; padding: 30px;
            border-radius: 28px; border: 1px solid var(--border);
        }
        input, select {
            width: 100%; background: var(--glass); border: 1px solid var(--border);
            padding: 12px; border-radius: 12px; color: white; margin-bottom: 15px;
        }
        label { font-size: 0.75rem; color: var(--text-dim); display: block; margin-bottom: 5px; }

        .btn-add-main {
            background: var(--glass); border: 1px dotted var(--accent); color: var(--accent);
            padding: 15px; border-radius: 20px; cursor: pointer; width: 100%; font-weight: 700;
            margin-bottom: 20px;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: rgba(10, 11, 16, 0.9); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); display: flex;
            justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-icon-box {
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; background: var(--glass); border: 1px solid var(--border);
            color: var(--text-dim); text-decoration: none;
        }
        .nav-icon-box.active { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <nav class="navbar">
            <div class="logo">NOVA<span class="accent">HUB</span></div>
            <div id="countIndicator" style="font-size: 0.7rem; color: var(--text-dim);">LOADING...</div>
        </nav>

        <main class="content-body">
            <header class="hero-section">
                <h1>Campus <span class="highlight">Ambassadors</span></h1>
                <p style="color: var(--text-dim); margin-bottom: 30px;">Manage the front-line representatives of the platform.</p>
            </header>

            <button class="btn-add-main" id="openAddModal">+ Recruit New Ambassador</button>

            <section class="ambassador-grid" id="ambassadorGrid">
                </section>
        </main>

        <div class="modal" id="addModal">
            <div class="modal-content">
                <h2 style="margin-bottom: 20px;">Recruit Ambassador</h2>
                <form id="ambassadorForm">
                    <label>Full Name</label>
                    <input type="text" id="ambName" required placeholder="John Doe">
                    
                    <label>Referral Name</label>
                    <input type="text" id="ambRefer" required placeholder="John Doe">
                    
                    <label>School ID Number (Matric)</label>
                    <input type="text" id="ambId" required placeholder="RUN/CPE/...">
                    
                    <label>Phone Number</label>
                    <input type="text" id="ambphone" required placeholder="08123456789">

                    <label>Institution</label>
                    <input type="text" id="ambInst" required value="Redeemer's University">

                    <label>Passport Photo</label>
                    <input type="file" id="ambPhoto" accept="image/*" required>

                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button type="button" id="closeModal" style="flex:1; background:none; border:1px solid var(--border); color:white; padding:12px; border-radius:12px; cursor:pointer;">Cancel</button>
                        <button type="submit" id="saveBtn" style="flex:2; background:var(--accent); border:none; color:white; padding:12px; border-radius:12px; cursor:pointer; font-weight:700;">Generate & Save</button>
                    </div>
                </form>
            </div>
        </div>

        <footer class="bottom-nav">
            <a href="dashboard.html" class="nav-icon-box"><i class="fi-home"></i></a>
            <a href="location.html" class="nav-icon-box"><i class="fi-marker"></i></a>
            <a href="ad-record.html" class="nav-icon-box"><i class="fi-graph-bar"></i></a>
            <a href="merch-signup.html" class="nav-icon-box active"><i class="fi-plus"></i></a>
        </footer>
    </div>

<script type="module">
import { db, auth } from './js/firebase-config.js';
import { collection, addDoc, onSnapshot, serverTimestamp, query, limit } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dltoup0cz/image/upload";
const UPLOAD_PRESET = "runhub_uploads";

const addModal = document.getElementById('addModal');
const openAddModal = document.getElementById('openAddModal');
const closeModal = document.getElementById('closeModal');
const ambassadorForm = document.getElementById('ambassadorForm');
const ambassadorGrid = document.getElementById('ambassadorGrid');
const countIndicator = document.getElementById('countIndicator');

let currentAmbassadorCount = 0;

// 🔐 AUTH & LOAD
onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = "./admin-login.html";
    loadAmbassadors();
});

function loadAmbassadors() {
    onSnapshot(collection(db, "ambassadors"), (snapshot) => {
        ambassadorGrid.innerHTML = '';
        currentAmbassadorCount = snapshot.size;
        countIndicator.innerText = `${currentAmbassadorCount} / 5 AMBASSADORS`;

        if(currentAmbassadorCount >= 5) openAddModal.style.display = 'none';

        snapshot.forEach(doc => {
            const amb = doc.data();
            const card = document.createElement('div');
            card.className = 'ambassador-card';
            card.innerHTML = `
                <img src="${amb.photoUrl}" class="profile-img">
                <div class="amb-name">${amb.fullName}</div>
                <div class="amb-info">${amb.phone} • ${amb.referName}</div>
                <div class="amb-info">${amb.matricNo} • ${amb.institution}</div>
                <button class="btn-view" onclick="window.open('${amb.contractUrl}', '_blank')">View Contract</button>
            `;
            ambassadorGrid.appendChild(card);
        });
    });
}

// UI LOGIC
openAddModal.onclick = () => addModal.style.display = 'flex';
closeModal.onclick = () => addModal.style.display = 'none';

// 📝 FORM SUBMISSION
ambassadorForm.onsubmit = async (e) => {
    e.preventDefault();
    if(currentAmbassadorCount >= 5) return alert("Maximum limit of 5 Ambassadors reached.");

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.innerText = "Processing...";

    const data = {
        fullName: document.getElementById('ambName').value,
        referName: document.getElementById('ambRefer').value.toLowerCase(),
        matricNo: document.getElementById('ambId').value,
        phone: document.getElementById('ambphone').value,
        institution: document.getElementById('ambInst').value,
    };

    const photoFile = document.getElementById('ambPhoto').files[0];

    try {
        // 1. Upload Passport
        const photoUrl = await uploadToCloudinary(photoFile);
        
        // 2. Generate Contract Canvas
        const contractBlob = await generateAmbassadorContract(data, photoUrl);
        
        // 3. Upload Contract
        const contractUrl = await uploadToCloudinary(contractBlob);

        // 4. Save to Firestore
        await addDoc(collection(db, "ambassadors"), {
            ...data,
            photoUrl,
            contractUrl,
            createdAt: serverTimestamp()
        });

        alert("Ambassador recruited successfully!");
        addModal.style.display = 'none';
        ambassadorForm.reset();

    } catch (err) {
        console.error(err);
        alert("Recruitment failed. Check console.");
    } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = "Generate & Save";
    }
};

// ☁️ CLOUDINARY HELPER
async function uploadToCloudinary(fileOrBlob) {
    const fd = new FormData();
    fd.append("file", fileOrBlob);
    fd.append("upload_preset", UPLOAD_PRESET);
    fd.append("resource_type", "auto");

    const res = await fetch(CLOUDINARY_URL, { method: "POST", body: fd });
    const data = await res.json();
    return data.secure_url;
}

// 🎨 UPDATED CONTRACT GENERATION (A4 Precision & Exact Content)
async function generateAmbassadorContract(data, photoUrl) {
    const canvas = document.createElement('canvas');
    canvas.width = 2480; // Standard A4 at 300 DPI
    canvas.height = 3508;
    const ctx = canvas.getContext('2d');
    const margin = 180;
    const contentWidth = canvas.width - (margin * 2);

    const loadImage = (src) => new Promise(res => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => res(img);
        img.onerror = () => res(null); // Fallback if image fails
        img.src = src;
    });

    const passportImg = await loadImage(photoUrl);
    const watermark = await loadImage("/start/backdrop.png");

    // 1. Background
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 2. Watermark
    if (watermark) {
        ctx.save();
        ctx.globalAlpha = 0.20;
        ctx.drawImage(watermark, (canvas.width - 1800) / 2, (canvas.height - 1800) / 2, 1800, 1800);
        ctx.restore();
    }

    // 3. Header & Passport
    ctx.fillStyle = "#000";
    ctx.font = "bold 70px Helvetica";
    ctx.fillText("NOVAHUB AMBASSADOR AGREEMENT", margin, 250);
    
    ctx.font = "38px Helvetica";
    ctx.fillText('This Agreement is made between NOVAHUB ("the Platform")', margin, 330);
    ctx.fillText('and the undersigned Ambassador ("the Ambassador").', margin, 385);

    if (passportImg) {
        ctx.drawImage(passportImg, canvas.width - margin - 350, 150, 350, 420);
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.strokeRect(canvas.width - margin - 350, 150, 350, 420);
    }

    // 4. Contract Body Text
    let y = 550;
    const drawSection = (title, lines) => {
        ctx.font = "bold 42px Helvetica";
        ctx.fillText(title, margin, y);
        y += 60;
        ctx.font = "36px Helvetica";
        lines.forEach(line => {
            // Simple text wrapping for long lines
            const words = line.split(' ');
            let currentLine = " * ";
            words.forEach(word => {
                let testLine = currentLine + word + " ";
                if (ctx.measureText(testLine).width > contentWidth - 40) {
                    ctx.fillText(currentLine, margin + 20, y);
                    y += 50;
                    currentLine = "   " + word + " ";
                } else {
                    currentLine = testLine;
                }
            });
            ctx.fillText(currentLine, margin + 20, y);
            y += 55;
        });
        y += 30;
    };

    drawSection("1. ROLE AND RESPONSIBILITIES", [
        "Active Promotion: Consistently promoting NOVAHUB to students both on and off-campus.",
        "User Acquisition: Introducing and onboarding new Customers and Vendors to the platform.",
        "Merchant Support: Assisting in the verification process for new Merchants.",
        "Brand Alignment: Maintaining a professional and honest representation of the brand."
    ]);

    drawSection("2. COMPENSATION AND REWARDS", [
        "Referral Commission: The Ambassador shall receive 30% of the platform revenue generated.",
        "Merchant Credit: A one-time credit of ₦5,000 if registered and verified as a Merchant.",
        "Profit Sharing: Eligibility for a higher share of monthly profit based on performance."
    ]);

    drawSection("3. PAYMENT TERMS", [
        "Cycle: Earnings calculated based on verified data from the previous month.",
        "Disbursement: Payments made on the 1st day of every new month.",
        "Method: Paid into the Ambassador's registered bank account or platform wallet."
    ]);

    drawSection("4. TRACKING AND VERIFICATION", [
        "Referral Tracking: Must use unique tracking links to ensure accurate calculation.",
        "Admin Representation: Acts as an official representative during merchant verification."
    ]);

    drawSection("5. TERM AND TERMINATION", [
        "Duration: Valid for one (1) year (12 months) from the date of signing.",
        "Termination: Immediate termination for fraud or 30 days of inactivity."
    ]);

    drawSection("6. CONFIDENTIALITY AND CONDUCT", [
        "The Ambassador agrees to keep all internal strategies and merchant data confidential.",
        "The Ambassador is an Independent Contractor, not an employee."
    ]);
  
      // 5. Final Agreement Statement
      y += 40;
      ctx.font = "bold 40px Helvetica";
      ctx.fillText("7. AGREEMENT SIGN-OFF", margin, y);
      y += 70;
      ctx.font = "italic 38px Helvetica"; // Slightly smaller to ensure fit
      
      const finalStatement = `I, ${data.fullName.toUpperCase()}, with the referral name ${data.referName}, matric number ${data.matricNo.toUpperCase()}, and phone number ${data.phone}, hereby agree to the terms listed above.`;
      
      // Wrapping logic for the final statement
      const words = finalStatement.split(' ');
      let currentLine = "";
      words.forEach(word => {
          let testLine = currentLine + word + " ";
          if (ctx.measureText(testLine).width > contentWidth) {
              ctx.fillText(currentLine, margin, y);
              y += 50;
              currentLine = word + " ";
          } else {
              currentLine = testLine;
          }
      });
      ctx.fillText(currentLine, margin, y);


    // 6. Signatures
    const sigY = 3200;
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 4;
    
    // Left Line (Ambassador)
    ctx.beginPath();
    ctx.moveTo(margin, sigY);
    ctx.lineTo(margin + 700, sigY);
    ctx.stroke();
    
    // Right Line (Founder)
    ctx.beginPath();
    ctx.moveTo(canvas.width - margin - 700, sigY);
    ctx.lineTo(canvas.width - margin, sigY);
    ctx.stroke();

    ctx.font = "bold 36px Helvetica";
    ctx.textAlign = "left";
    ctx.fillText("Ambassador Signature & Date", margin, sigY + 60);
    
    ctx.textAlign = "right";
    ctx.fillText("Founder, NOVAHUB / Authorized Rep", canvas.width - margin, sigY + 60);

    // Return as Blob
    return new Promise(res => canvas.toBlob(res, 'image/png', 0.9));
}

</script>
</body>
</html>
